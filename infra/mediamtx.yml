logLevel: info

api: yes
apiAddress: :9997

authMethod: http
authHTTPAddress: http://api:3000/camera-stream/mediamtx-auth
authHTTPExclude: []

metrics: yes
metricsAddress: :9998

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp, udp]

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsAlwaysRemux: false
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentCount: 7

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: ['168.194.13.70']
# Em Docker, anunciar os IPs das interfaces inclui IPs internos (172.x) inalcançáveis
# pelos clientes na LAN — isso vira candidato ICE morto e faz o WebRTC demorar/flapar
# (vídeo piscando/reconectando). Anunciamos apenas o host real acima.
webrtcIPsFromInterfaces: no

pathDefaults:
  rtspTransport: tcp

paths:
  all_others:
