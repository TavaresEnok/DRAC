x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-50m}
    max-file: ${DOCKER_LOG_MAX_FILES:-5}

services:
  postgres:
    image: postgres:16-alpine
    container_name: vms-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-vms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vms-net

  redis:
    image: redis:7-alpine
    container_name: vms-redis
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vms-net

  postgres-backup:
    image: postgres:16-alpine
    container_name: vms-postgres-backup
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-vms_db}
      POSTGRES_BACKUP_RETENTION_DAYS: ${POSTGRES_BACKUP_RETENTION_DAYS:-14}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups/postgres:/backups
    command: >
      sh -c 'set -eu;
      mkdir -p /backups;
      while true; do
        ts=$$(date -u +%Y%m%dT%H%M%SZ);
        export PGPASSWORD="$$POSTGRES_PASSWORD";
        tmp="/backups/.drac-postgres-$$ts.dump.tmp";
        out="/backups/drac-postgres-$$ts.dump";
        rm -f "$$tmp";
        pg_dump -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -Fc -f "$$tmp";
        pg_restore --list "$$tmp" >/dev/null;
        mv "$$tmp" "$$out";
        echo "$$(date -u +%FT%TZ) postgres_backup=ok file=$$(basename "$$out")";
        find /backups -type f -name "drac-postgres-*.dump" -mtime +$${POSTGRES_BACKUP_RETENTION_DAYS:-14} -delete;
        sleep "$${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}";
      done'
    networks:
      - vms-net

  postgres-backup-verify:
    image: postgres:16-alpine
    container_name: vms-postgres-backup-verify
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      postgres-backup:
        condition: service_started
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_BACKUP_VERIFY_INTERVAL_SECONDS: ${POSTGRES_BACKUP_VERIFY_INTERVAL_SECONDS:-86400}
      POSTGRES_BACKUP_VERIFY_INITIAL_DELAY_SECONDS: ${POSTGRES_BACKUP_VERIFY_INITIAL_DELAY_SECONDS:-900}
    volumes:
      - ./backups/postgres:/backups:ro
      - ./verify-postgres-backup.sh:/verify-postgres-backup.sh:ro
    command: ["/bin/sh", "/verify-postgres-backup.sh"]
    networks:
      - vms-net

  central-data-backup:
    image: alpine:3.20
    container_name: vms-central-data-backup
    restart: unless-stopped
    logging: *default-logging
    environment:
      CENTRAL_BACKUP_INTERVAL_SECONDS: ${CENTRAL_BACKUP_INTERVAL_SECONDS:-86400}
      CENTRAL_BACKUP_RETENTION_DAYS: ${CENTRAL_BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ${CENTRAL_DATA_DIR:-../apps/central/data}:/central-data:ro
      - ./backups/central:/backups
      - ./backup-central-data.sh:/backup-central-data.sh:ro
    command: ["/bin/sh", "/backup-central-data.sh"]

  offsite-backup:
    image: rclone/rclone:1
    container_name: vms-offsite-backup
    profiles:
      - offsite-backup
    restart: unless-stopped
    logging: *default-logging
    environment:
      OFFSITE_BACKUP_REMOTE: ${OFFSITE_BACKUP_REMOTE:-}
      OFFSITE_BACKUP_INTERVAL_SECONDS: ${OFFSITE_BACKUP_INTERVAL_SECONDS:-86400}
      OFFSITE_INCLUDE_RECORDINGS: ${OFFSITE_INCLUDE_RECORDINGS:-false}
      OFFSITE_BACKUP_TRANSFERS: ${OFFSITE_BACKUP_TRANSFERS:-4}
      OFFSITE_BACKUP_CHECKERS: ${OFFSITE_BACKUP_CHECKERS:-8}
    volumes:
      - ./backups:/data/backups:ro
      - ./storage:/data/storage:ro
      - ${KEYSTORE_BACKUP_DIR:-/home/flashnet/keystore-backups}:/data/keystores:ro
      - ${RCLONE_CONFIG_PATH:-./rclone.conf}:/config/rclone/rclone.conf:ro
      - ./offsite-backup.sh:/offsite-backup.sh:ro
    entrypoint: ["/bin/sh", "/offsite-backup.sh"]

  adminer:
    image: adminer:latest
    container_name: vms-adminer
    profiles:
      - admin-tools
    restart: unless-stopped
    logging: *default-logging
    networks:
      - vms-net

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: vms-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-change_me_postgres_password}@postgres:5432/${POSTGRES_DB:-vms_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=3000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
      - TRUST_PROXY_HOPS=${TRUST_PROXY_HOPS:-0}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CAMERA_SECRET_KEY=${CAMERA_SECRET_KEY:?CAMERA_SECRET_KEY is required}
      - CAMERA_SECRET_KEY_LEGACY=${CAMERA_SECRET_KEY_LEGACY:-}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      - EVIDENCE_HMAC_SECRET=${EVIDENCE_HMAC_SECRET:?EVIDENCE_HMAC_SECRET is required}
      - EVIDENCE_HMAC_KEY_ID=${EVIDENCE_HMAC_KEY_ID:-local-v1}
      - CLOUD_CONNECTOR_ENABLED=${CLOUD_CONNECTOR_ENABLED:-false}
      - CLOUD_API_URL=${CLOUD_API_URL:-}
      - CLOUD_INSTALLATION_ID=${CLOUD_INSTALLATION_ID:-}
      - CLOUD_LICENSE_KEY=${CLOUD_LICENSE_KEY:-}
      - CLOUD_CUSTOMER_NAME=${CLOUD_CUSTOMER_NAME:-}
      - CLOUD_HEARTBEAT_INTERVAL_SECONDS=${CLOUD_HEARTBEAT_INTERVAL_SECONDS:-60}
      - CLOUD_CONNECTOR_TIMEOUT_MS=${CLOUD_CONNECTOR_TIMEOUT_MS:-8000}
      - DRAC_VERSION=${DRAC_VERSION:-local}
      - DRAC_LAUNCH_PROFILE=${DRAC_LAUNCH_PROFILE:-standard}
      - RECORDINGS_ROOT=/storage
      - POSTGRES_BACKUP_DIR=/backups/postgres
      - RECORDING_AUTO_START_ENABLED=${RECORDING_AUTO_START_ENABLED:-false}
      - RECORDING_AUTO_START_DELAY_MS=${RECORDING_AUTO_START_DELAY_MS:-10000}
      - RECORDING_DISK_GUARD_ENABLED=${RECORDING_DISK_GUARD_ENABLED:-true}
      - RECORDING_DISK_GUARD_INTERVAL_MS=${RECORDING_DISK_GUARD_INTERVAL_MS:-30000}
      - RECORDING_DISK_GUARD_MAX_USED_PERCENT=${RECORDING_DISK_GUARD_MAX_USED_PERCENT:-92}
      - FFMPEG_RECORDING_CODEC_MODE=${FFMPEG_RECORDING_CODEC_MODE:-copy}
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - RECORDING_RETENTION_DAYS=${RECORDING_RETENTION_DAYS:-7}
      - RETENTION_USE_BULLMQ=${RETENTION_USE_BULLMQ:-true}
      - MEDIAMTX_ENABLED=true
      - MEDIAMTX_API_BASE_URL=${MEDIAMTX_API_BASE_URL:-http://mediamtx:9997}
      - MEDIAMTX_RTSP_INTERNAL_URL=${MEDIAMTX_RTSP_INTERNAL_URL:-rtsp://mediamtx:8554}
      - MEDIAMTX_API_USER=${MEDIAMTX_API_USER:?MEDIAMTX_API_USER is required}
      - MEDIAMTX_API_PASS=${MEDIAMTX_API_PASS:?MEDIAMTX_API_PASS is required}
      - MEDIAMTX_PUBLIC_HOST=${MEDIAMTX_PUBLIC_HOST:-}
      - MEDIAMTX_PUBLIC_SCHEME=${MEDIAMTX_PUBLIC_SCHEME:-}
      - MEDIAMTX_PUBLIC_WEBRTC_URL=${MEDIAMTX_PUBLIC_WEBRTC_URL:-}
      - MEDIAMTX_PUBLIC_HLS_URL=${MEDIAMTX_PUBLIC_HLS_URL:-}
      - MEDIAMTX_HLS_PORT=${MEDIAMTX_HLS_PORT:-8888}
      - MEDIAMTX_WEBRTC_PORT=${MEDIAMTX_WEBRTC_PORT:-8889}
      - MEDIAMTX_HLS_ALLOW_ORIGIN=${MEDIAMTX_HLS_ALLOW_ORIGIN:-*}
      - MEDIAMTX_WEBRTC_ALLOW_ORIGIN=${MEDIAMTX_WEBRTC_ALLOW_ORIGIN:-*}
      - MEDIAMTX_WEBRTC_ADDITIONAL_HOST=${MEDIAMTX_WEBRTC_ADDITIONAL_HOST:-127.0.0.1}
      - MEDIAMTX_SOURCE_ON_DEMAND=${MEDIAMTX_SOURCE_ON_DEMAND:-false}
      - MEDIAMTX_SOURCE_ON_DEMAND_START_TIMEOUT=${MEDIAMTX_SOURCE_ON_DEMAND_START_TIMEOUT:-6s}
      - MEDIAMTX_SOURCE_ON_DEMAND_CLOSE_AFTER=${MEDIAMTX_SOURCE_ON_DEMAND_CLOSE_AFTER:-5m}
      - MEDIAMTX_RUN_ON_DEMAND_CLOSE_AFTER=${MEDIAMTX_RUN_ON_DEMAND_CLOSE_AFTER:-5m}
      - MEDIAMTX_SELECTED_RUN_ON_DEMAND_CLOSE_AFTER=${MEDIAMTX_SELECTED_RUN_ON_DEMAND_CLOSE_AFTER:-90s}
      - MEDIAMTX_WARM_PATHS_ON_BOOT=${MEDIAMTX_WARM_PATHS_ON_BOOT:-true}
      - MEDIAMTX_WARM_SELECTED_PATHS_ON_BOOT=${MEDIAMTX_WARM_SELECTED_PATHS_ON_BOOT:-false}
      - ALARM_WEBHOOK_ALLOWED_HOSTS=${ALARM_WEBHOOK_ALLOWED_HOSTS:-}
      - ALARM_WEBHOOK_SIGNING_SECRET=${ALARM_WEBHOOK_SIGNING_SECRET:-}
      - CAMERA_TEST_ALLOW_PUBLIC_IP=${CAMERA_TEST_ALLOW_PUBLIC_IP:-false}
      - FFMPEG_RTSP_FALLBACK_TRANSPORTS=tcp,udp
      - FFMPEG_RTSP_FALLBACK_PORTS=51488,51489,51490
      - FFMPEG_RTSP_ENABLE_PORT_FALLBACK=false
      - AI_AUTO_START_ENABLED=${AI_AUTO_START_ENABLED:-true}
      - AI_USE_MEDIAMTX=${AI_USE_MEDIAMTX:-false}
      - AI_RTSP_SUBTYPE=${AI_RTSP_SUBTYPE:-auto}
      - AI_ENABLED_CAMERA_IDS=${AI_ENABLED_CAMERA_IDS:-}
      - AI_ACTIVE_CAMERA_IDS=${AI_ACTIVE_CAMERA_IDS:-}
      - AI_FORCE_SINGLE_CAMERA=${AI_FORCE_SINGLE_CAMERA:-false}
      - AI_SINGLE_CAMERA_ID=${AI_SINGLE_CAMERA_ID:-}
      - AI_ANALYTICS_CAMERA_IDS=${AI_ANALYTICS_CAMERA_IDS:-}
      - AI_RTSP_STREAM_PROFILE=${AI_RTSP_STREAM_PROFILE:-analytics}
      - AI_ANALYTICS_SOURCE=${AI_ANALYTICS_SOURCE:-direct_camera}
      - AI_ANALYTICS_HEVC_FALLBACK=${AI_ANALYTICS_HEVC_FALLBACK:-true}
      # Agente de build white-label (roda no HOST; ver scripts/build-agent.mjs)
      - APP_BUILDER_AGENT_URL=${APP_BUILDER_AGENT_URL:-http://host.docker.internal:8780}
      - APP_BUILDER_AGENT_TOKEN=${APP_BUILDER_AGENT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./storage:/storage
      - ./backups/postgres:/backups/postgres:ro
    depends_on:
      - postgres
      - redis
      - mediamtx
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - vms-net

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: vms-web
    restart: unless-stopped
    logging: *default-logging
    # APKs white-label publicados pelo build-agent ficam num diretório do HOST
    # montado aqui (somente leitura). Sobrevive a rebuilds do container — antes os
    # APKs eram copiados pra dentro do container e sumiam a cada recriação.
    volumes:
      - ./apk:/usr/share/nginx/html/apk:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vms-net

  camera-worker:
    build:
      context: ..
      dockerfile: services/camera-worker-go/Dockerfile
    container_name: vms-camera-worker
    profiles:
      - legacy-worker
    restart: unless-stopped
    logging: *default-logging
    environment:
      - REDIS_ADDR=redis:6379
      - API_URL=http://api:3000
      - CAMERA_SECRET_KEY=${CAMERA_SECRET_KEY:?CAMERA_SECRET_KEY is required}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      - STORAGE_ROOT=/storage
    volumes:
      - ./storage:/storage
    depends_on:
      - redis
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - vms-net

  ai-service:
    # Sobe junto com o stack (sem profile): a detecção de movimento é parte do
    # sistema. Fica ocioso (~0 CPU) até uma câmera ser armada para gravação por
    # movimento — só as armadas são analisadas (ver ai-manager filtro 'motion').
    build:
      context: ../services/ai-service-python
      dockerfile: Dockerfile
    container_name: vms-ai-service
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "8000"
    environment:
      - REDIS_ADDR=redis:6379
      - API_URL=http://api:3000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      - AI_MODELS_DIR=/app/models
      - GENERAL_MODE=${GENERAL_MODE:-general}
      - GENERAL_MODEL=${GENERAL_MODEL:-yolo26n}
      - GENERAL_RUNTIME=${GENERAL_RUNTIME:-openvino_cpu}
      - GENERAL_PRECISION=${GENERAL_PRECISION:-int8}
      - GENERAL_ANALYSIS_WIDTH=${GENERAL_ANALYSIS_WIDTH:-960}
      - GENERAL_ANALYSIS_HEIGHT=${GENERAL_ANALYSIS_HEIGHT:-540}
      - GENERAL_IMGSZ=${GENERAL_IMGSZ:-640}
      - GENERAL_DETECTION_FPS=${GENERAL_DETECTION_FPS:-4.0}
      - GENERAL_MOTION_TRIGGER=${GENERAL_MOTION_TRIGGER:-SYSTEM}
      - GENERAL_EVENT_DEBOUNCE_SECONDS=${GENERAL_EVENT_DEBOUNCE_SECONDS:-10}
      - GENERAL_CLASSES=${GENERAL_CLASSES:-person,bicycle,car,motorcycle,bus}
      - GENERAL_CLASS_IDS=${GENERAL_CLASS_IDS:-0,1,2,3,5}
      - GENERAL_CONFIDENCE_PERSON=${GENERAL_CONFIDENCE_PERSON:-0.30}
      - GENERAL_CONFIDENCE_BICYCLE=${GENERAL_CONFIDENCE_BICYCLE:-0.25}
      - GENERAL_CONFIDENCE_CAR=${GENERAL_CONFIDENCE_CAR:-0.25}
      - GENERAL_CONFIDENCE_MOTORCYCLE=${GENERAL_CONFIDENCE_MOTORCYCLE:-0.25}
      - GENERAL_CONFIDENCE_VEHICLE=${GENERAL_CONFIDENCE_VEHICLE:-0.25}
      - GENERAL_MIN_OBJECT_HEIGHT_PX=${GENERAL_MIN_OBJECT_HEIGHT_PX:-10}
      - GENERAL_DETECT_VEHICLES=${GENERAL_DETECT_VEHICLES:-false}
      - GENERAL_DETECT_OBJECTS=${GENERAL_DETECT_OBJECTS:-false}
      - GENERAL_DETECT_ANIMALS=${GENERAL_DETECT_ANIMALS:-false}
      - GENERAL_RECOGNITION=${GENERAL_RECOGNITION:-false}
      - GENERAL_FACE_DETECTION=${GENERAL_FACE_DETECTION:-false}
      - GENERAL_TRACKER=${GENERAL_TRACKER:-bytetrack}
      - GENERAL_TRACK_BUFFER=${GENERAL_TRACK_BUFFER:-20}
      - GENERAL_PERSISTENT_TRACK_ID=${GENERAL_PERSISTENT_TRACK_ID:-true}
      - GENERAL_SHOW_AFTER_HITS=${GENERAL_SHOW_AFTER_HITS:-1}
      - GENERAL_HIDE_AFTER_MISSES=${GENERAL_HIDE_AFTER_MISSES:-5}
      - GENERAL_LOST_TTL_MS=${GENERAL_LOST_TTL_MS:-2000}
      - GENERAL_OVERLAY_MODE=${GENERAL_OVERLAY_MODE:-triangle}
      - GENERAL_OVERLAY_TTL_MS=${GENERAL_OVERLAY_TTL_MS:-1800}
      - GENERAL_EMIT_EVENTS=${GENERAL_EMIT_EVENTS:-true}
      - GENERAL_MODEL_PATH=${GENERAL_MODEL_PATH:-}
      - GENERAL_MODEL_INPUT_WIDTH=${GENERAL_MODEL_INPUT_WIDTH:-0}
      - GENERAL_MODEL_INPUT_HEIGHT=${GENERAL_MODEL_INPUT_HEIGHT:-0}
      - GENERAL_MODEL_DYNAMIC=${GENERAL_MODEL_DYNAMIC:-false}
      - GENERAL_MODEL_END2END=${GENERAL_MODEL_END2END:-true}
      - GENERAL_MODEL_NMS=${GENERAL_MODEL_NMS:-false}
      - GENERAL_OPENVINO_DEVICE=${GENERAL_OPENVINO_DEVICE:-CPU}
      - GENERAL_OPENVINO_PERFORMANCE_HINT=${GENERAL_OPENVINO_PERFORMANCE_HINT:-LATENCY}
      - GENERAL_INFERENCE_THREADS=${GENERAL_INFERENCE_THREADS:-}
      - GENERAL_INFERENCE_WORKERS=${GENERAL_INFERENCE_WORKERS:-}
      - AI_ENABLED_CAMERA_IDS=${AI_ENABLED_CAMERA_IDS:-}
      - AI_ACTIVE_CAMERA_IDS=${AI_ACTIVE_CAMERA_IDS:-}
      - AI_FORCE_SINGLE_CAMERA=${AI_FORCE_SINGLE_CAMERA:-false}
      - AI_SINGLE_CAMERA_ID=${AI_SINGLE_CAMERA_ID:-}
      - AI_ANALYTICS_CAMERA_IDS=${AI_ANALYTICS_CAMERA_IDS:-}
      - AI_RTSP_STREAM_PROFILE=${AI_RTSP_STREAM_PROFILE:-analytics}
      - AI_ANALYTICS_SOURCE=${AI_ANALYTICS_SOURCE:-direct_camera}
      - AI_ANALYTICS_HEVC_FALLBACK=${AI_ANALYTICS_HEVC_FALLBACK:-true}
      - AI_LATEST_FRAME_ONLY=${AI_LATEST_FRAME_ONLY:-true}
      - AI_CPU_RESERVE_PERCENT=${AI_CPU_RESERVE_PERCENT:-25}
      - AI_INFERENCE_WORKER_COUNT=${AI_INFERENCE_WORKER_COUNT:-}
      - AI_INFERENCE_THREADS_OVERRIDE=${AI_INFERENCE_THREADS_OVERRIDE:-}
      - AI_SELECTED_DETECTION_FPS=${AI_SELECTED_DETECTION_FPS:-3.0}
      - AI_SELECTED_ANALYSIS_WIDTH=${AI_SELECTED_ANALYSIS_WIDTH:-960}
      - AI_SELECTED_ANALYSIS_HEIGHT=${AI_SELECTED_ANALYSIS_HEIGHT:-540}
      - AI_SELECTED_IMGSZ=${AI_SELECTED_IMGSZ:-640}
      - AI_GRID_DETECTION_FPS=${AI_GRID_DETECTION_FPS:-1.0}
      - AI_GRID_ANALYSIS_WIDTH=${AI_GRID_ANALYSIS_WIDTH:-640}
      - AI_GRID_ANALYSIS_HEIGHT=${AI_GRID_ANALYSIS_HEIGHT:-360}
      - AI_GRID_IMGSZ=${AI_GRID_IMGSZ:-512}
      - AI_QOS_LIVE_ENABLED=${AI_QOS_LIVE_ENABLED:-true}
      - AI_ADAPTIVE_MODE=${AI_ADAPTIVE_MODE:-true}
      - AI_ADAPTIVE_PILOT_CAMERA_IDS=${AI_ADAPTIVE_PILOT_CAMERA_IDS:-*}
      - AI_ADAPTIVE_WINDOW_SECONDS=${AI_ADAPTIVE_WINDOW_SECONDS:-6}
      - AI_ADAPTIVE_DEGRADE_COOLDOWN_SECONDS=${AI_ADAPTIVE_DEGRADE_COOLDOWN_SECONDS:-8}
      - AI_ADAPTIVE_RECOVER_COOLDOWN_SECONDS=${AI_ADAPTIVE_RECOVER_COOLDOWN_SECONDS:-15}
      - AI_ADAPTIVE_DROP_RATIO_HIGH=${AI_ADAPTIVE_DROP_RATIO_HIGH:-0.12}
      - AI_ADAPTIVE_DROP_RATIO_LOW=${AI_ADAPTIVE_DROP_RATIO_LOW:-0.03}
      - AI_ADAPTIVE_CPU_HIGH=${AI_ADAPTIVE_CPU_HIGH:-88}
      - AI_ADAPTIVE_CPU_LOW=${AI_ADAPTIVE_CPU_LOW:-68}
      - AI_ADAPTIVE_SELECTED_FPS_FACTORS=${AI_ADAPTIVE_SELECTED_FPS_FACTORS:-1.0,0.85,0.70}
      - AI_ADAPTIVE_GRID_FPS_FACTORS=${AI_ADAPTIVE_GRID_FPS_FACTORS:-1.0,0.85}
      - AI_ADAPTIVE_SELECTED_IMGSZ_STEPS=${AI_ADAPTIVE_SELECTED_IMGSZ_STEPS:-640,512,416}
      - AI_ADAPTIVE_GRID_IMGSZ_STEPS=${AI_ADAPTIVE_GRID_IMGSZ_STEPS:-512,416}
      - AI_ADAPTIVE_SELECTED_RESOLUTION_SCALES=${AI_ADAPTIVE_SELECTED_RESOLUTION_SCALES:-1.0,0.92,0.84,0.76}
      - AI_ADAPTIVE_GRID_RESOLUTION_SCALES=${AI_ADAPTIVE_GRID_RESOLUTION_SCALES:-1.0,0.90,0.80}
      - AI_READINESS_MAX_FRAME_AGE_SECONDS=${AI_READINESS_MAX_FRAME_AGE_SECONDS:-20}
    volumes:
      - ../services/ai-service-python:/app
      - ./storage:/storage
      - ./ai-models:/app/models
    depends_on:
      - redis
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - vms-net

  mediamtx:
    image: bluenviron/mediamtx:1-ffmpeg
    container_name: vms-mediamtx
    restart: unless-stopped
    # init: roda o tini como PID 1, que COLHE processos zumbis. Sem isto o MediaMTX
    # (PID 1) não faz reaping e cada ffmpeg de restream órfão vira zumbi que acumula
    # para sempre (já observado: centenas). Em escala isso esgota a tabela de PIDs.
    init: true
    logging: *default-logging
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MEDIAMTX_API_USER=${MEDIAMTX_API_USER:?MEDIAMTX_API_USER is required}
      - MEDIAMTX_API_PASS=${MEDIAMTX_API_PASS:?MEDIAMTX_API_PASS is required}
      - MEDIAMTX_HLS_ALLOW_ORIGIN=${MEDIAMTX_HLS_ALLOW_ORIGIN:-*}
      - MEDIAMTX_WEBRTC_ALLOW_ORIGIN=${MEDIAMTX_WEBRTC_ALLOW_ORIGIN:-*}
      - MTX_HLSALLOWORIGINS=${MEDIAMTX_HLS_ALLOW_ORIGIN:-*}
      - MTX_WEBRTCALLOWORIGINS=${MEDIAMTX_WEBRTC_ALLOW_ORIGIN:-*}
      - MEDIAMTX_WEBRTC_ADDITIONAL_HOST=${MEDIAMTX_WEBRTC_ADDITIONAL_HOST:-127.0.0.1}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8554 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vms-net

volumes:
  postgres_data:

networks:
  vms-net:
    driver: bridge
