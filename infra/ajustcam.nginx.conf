# Canonical HTTPS entrypoint for this installation.
# The Docker services are intentionally bound to loopback; only Nginx and the
# WebRTC UDP media port are reachable from outside the host.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name ajustcam.ajustconsulting.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ajustcam.ajustconsulting.com.br;

    ssl_certificate /etc/letsencrypt/live/ajustcam.ajustconsulting.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ajustcam.ajustconsulting.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 512m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # API goes directly to Nest so X-Forwarded-For contains the real client.
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # MediaMTX WHEP signaling. UDP 8189 remains the media transport exposed by
    # Docker; signaling and tokens stay under the trusted HTTPS origin.
    location /webrtc/ {
        proxy_pass http://127.0.0.1:8889/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
    }

    # HLS fallback for browsers/devices without a healthy WebRTC path.
    location /hls/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        # O MediaMTX faz um 302 de "cookieCheck" com Location relativo à raiz
        # (ex.: /cam_xxx/index.m3u8?cookieCheck=1) — SEM saber que está sob /hls/.
        # Sem reescrever, o browser segue o redirect para fora do /hls/ e cai no SPA,
        # quebrando o HLS (fallback do live e o player do mobile). Reescreve o prefixo:
        proxy_redirect ~^/(cam_.*)$ /hls/$1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
    }

    # DRAC Central (painel mestre) — sem domínio próprio; servido sob /central no
    # mesmo host HTTPS. A porta 9765 é publicada só em 127.0.0.1 (não pública); o
    # app é base-path-aware via X-Forwarded-Prefix. O trailing slash no proxy_pass
    # tira o /central/ antes de repassar (o app vê /api/..., /assets/...).
    location = /central { return 301 /central/; }
    location /central/ {
        proxy_pass http://127.0.0.1:9765/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /central;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
