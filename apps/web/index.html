<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        const theme = localStorage.getItem('drac-theme') || localStorage.getItem('nexusguard-theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark' || theme === 'dim');
        document.documentElement.style.colorScheme = theme === 'dark' || theme === 'dim' ? 'dark' : 'light';
      } catch (_) {}
    </script>
    <title>DRAC VMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
