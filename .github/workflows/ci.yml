name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scripts:
    name: shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check scripts
        run: |
          bash -n scripts/*.sh

  pnpm-verify:
    name: pnpm verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

  docker-build:
    name: docker build api web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile --build-arg VITE_API_URL= .
